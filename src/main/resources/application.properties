spring.application.name=saas-billing-orchestrator
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

app.jwt.secret=${APP_JWT_SECRET:change-this-jwt-secret-key-with-at-least-32-bytes}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:3600}

quota.reconciliation.fixed-delay-ms=${QUOTA_RECONCILIATION_DELAY_MS:300000}

stripe.price-id.plus=${STRIPE_PRICE_ID_PLUS:}
stripe.price-id.pro=${STRIPE_PRICE_ID_PRO:}

spring.data.redis.repositories.enabled=false

spring.jpa.open-in-view=false
