# Database Configuration (Points to your local Docker Postgres)
spring.datasource.billing.jdbc-url=${BILLING_DB_URL:jdbc:postgresql://localhost:5432/billing_db}
spring.datasource.billing.username=${BILLING_DB_USERNAME:user}
spring.datasource.billing.password=${BILLING_DB_PASS:password}

# JPA/Hibernate Configuration (Senior setup: validate schema, don't blindly drop tables)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect