# Database Configuration (Points to your local Docker Postgres)
spring.datasource.billing.jdbc-url=${BILLING_DB_URL:jdbc:postgresql://localhost:5432/sbo_dev}
spring.datasource.billing.username=${BILLING_DB_USERNAME:sbo_admin}
spring.datasource.billing.password=${BILLING_DB_PASS:password}

# JPA/Hibernate Configuration (Senior setup: validate schema, don't blindly drop tables)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===================================================================
# STRIPE B2B FINANCIAL ENGINE CONFIGURATION
# ===================================================================
# The secret key used to authenticate with Stripe's API
stripe.api.key=STRIPE_PUBLISHABLE_KEY

# The cryptographic secret used to verify incoming webhooks
stripe.webhook.secret=STRIPE_SECRET_KEY