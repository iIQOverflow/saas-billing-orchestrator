# PostgreSQL datasource
spring.datasource.url=${BILLING_DB_URL:jdbc:postgresql://localhost:5432/sbo_dev}
spring.datasource.username=${BILLING_DB_USERNAME:sbo_admin}
spring.datasource.password=${BILLING_DB_PASS:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and schema ownership
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis metering cache
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2s

# Stripe
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY}
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

server.port=8080
