# Database Configuration (Points to your local Docker Postgres)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/billing_db}
spring.datasource.username=${DB_USER:user}
spring.datasource.password=${DB_PASS:password}

# JPA/Hibernate Configuration (Senior setup: validate schema, don't blindly drop tables)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true