name: Deploy to Amazon EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ec2-user/app"
          strip_components: 1

      - name: Execute and Restart App on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Step 1: Stop the old Java application gracefully
            killall java || true
            
            # Step 2: Dynamically fetch the database password from AWS SSM
            # (Ensure the parameter name exactly matches what you created in AWS)
            export BILLING_DB_PASS=$(aws ssm get-parameter --region ap-southeast-2 --name "/saas-billing-orchestrator/billing-db/postgres/password" --with-decryption --query "Parameter.Value" --output text)
            export BILLING_DB_URL=$(aws ssm get-parameter --region ap-southeast-2 --name "/saas-billing-orchestrator/billing-db/postgres/url" --with-decryption --query "Parameter.Value" --output text)
            export BILLING_DB_USERNAME=$(aws ssm get-parameter --region ap-southeast-2 --name "/saas-billing-orchestrator/billing-db/postgres/username" --with-decryption --query "Parameter.Value" --output text)
            export STRIPE_PUBLIC_KEY=$(aws ssm get-parameter --region ap-southeast-2 --name "/saas-billing-orchestrator/stripe/public_key" --with-decryption --query "Parameter.Value" --output text)
            export STRIPE_SECRET_KEY=$(aws ssm get-parameter --region ap-southeast-2 --name "/saas-billing-orchestrator/stripe/secret_key" --with-decryption --query "Parameter.Value" --output text)
            
            
            # Step 3: Start the new application securely in the background
            nohup java -jar \
              -Dspring.profiles.active=prod \
              -DB_URL=${{ secrets.DB_URL }} \
              -DDB_USERNAME=${{ secrets.DB_USERNAME }} \
              -DDB_PASSWORD=$DB_PASS \
              /home/ec2-user/app/*.jar > /home/ec2-user/app/application.log 2>&1 &