- name: Redeploy on Lightsail
  uses: appleboy/ssh-action@v1
  with:
    host: ${{ secrets.EC2_HOST }}
    username: ${{ secrets.EC2_USERNAME }}
    key: ${{ secrets.EC2_SSH_KEY }}
    script: |
      set -euo pipefail
      
      echo "==> Move to repo"
      cd /opt/sbo/app
      
      echo "==> Update code from GitHub"
      git fetch --all --prune
      git reset --hard origin/main
      
      echo "==> Ensure infra containers are running"
      cd /opt/sbo/infra
      docker compose up -d
      
      echo "==> Build backend on host"
      cd /opt/sbo/app
      chmod +x mvnw
      ./mvnw clean package -DskipTests
      
      echo "==> Build frontend on host"
      cd /opt/sbo/app/frontend
      npm ci
      npm run build
      
      echo "==> Restart backend and frontend"
      sudo systemctl restart sbo-backend
      sudo systemctl restart sbo-frontend
      
      echo "==> Verify systemd service state"
      sudo systemctl is-active --quiet sbo-backend
      sudo systemctl is-active --quiet sbo-frontend
      
      echo "==> Wait for backend health"
      for i in {1..30}; do
        if curl --fail --silent http://127.0.0.1:8080/actuator/health > /dev/null; then
          echo "Backend is healthy"
          break
        fi
        echo "Backend not ready yet ($i/30), waiting..."
        sleep 2
      done
      curl --fail --silent http://127.0.0.1:8080/actuator/health > /dev/null
      
      echo "==> Wait for frontend readiness"
      for i in {1..30}; do
        if curl --silent --head http://127.0.0.1:3000/ > /dev/null; then
          echo "Frontend is reachable"
          break
        fi
        echo "Frontend not ready yet ($i/30), waiting..."
        sleep 2
      done
      curl --silent --head http://127.0.0.1:3000/ > /dev/null
      
      echo "==> Redeploy finished successfully"