services:
  postgres-db:
    image: postgres:15-alpine
    container_name: sbo-postgres
    environment:
      POSTGRES_USER: sbo_admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sbo_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data: